<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icon.jpg"/>
<title>都市异闻录：鬼契约底座</title>
<style>
:root{
  --bg:#050505;
  --panel:#0d0d0d;
  --panel-2:#111;
  --line:#252525;
  --line-strong:#3a3a3a;
  --text:#d0d0d0;
  --muted:#999;
  --green:#90ff90;
  --red:#ff6b6b;
  --purple:#c77dff;
  --yellow:#ffd166;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:
    linear-gradient(rgba(144,255,144,.025) 1px,transparent 1px),
    radial-gradient(circle at top,#151515 0,#050505 48%,#020202 100%);
  background-size:100% 3px,auto;
  color:var(--text);
  font-family:Consolas,"Microsoft YaHei",monospace;
  min-height:100vh;
  overflow:hidden;
}

body.pollution-critical{
  color:#ffb3b3;
}

body.pollution-critical #game{
  border-color:#6b1d1d;
  box-shadow:0 24px 80px rgba(120,0,0,.35);
}

body.pollution-critical #title,
body.pollution-critical .green,
body.pollution-critical #status,
body.pollution-critical .modalHeader{
  color:#ff4d4d;
}

body.pollution-critical button:hover:not(:disabled),
body.pollution-critical .inputLine:focus{
  border-color:#ff4d4d;
}

#game{
  width:100vw;
  height:100vh;
  background:rgba(13,13,13,.96);
  border:0;
  display:grid;
  grid-template-rows:auto 1fr;
  flex-direction:column;
  position:relative;
  box-shadow:inset 0 0 90px rgba(0,0,0,.8);
}

#title{
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  color:var(--green);
  font-size:20px;
  letter-spacing:0;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}

#title small{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin-top:4px;
}

#quickActions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

#status{
  padding:0;
  font-size:13px;
  color:var(--muted);
  white-space:pre-line;
  line-height:1.55;
}

#output{
  min-height:0;
  padding:16px;
  overflow-y:auto;
  line-height:1.72;
  white-space:pre-wrap;
  border:1px solid var(--line);
  background:rgba(4,4,4,.58);
}

#choices{
  padding:12px 0 0;
  border-top:0;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  min-height:68px;
  align-items:center;
}

button,input{
  font:inherit;
}

button{
  background:var(--panel-2);
  border:1px solid var(--line-strong);
  color:var(--text);
  padding:10px 14px;
  cursor:pointer;
  transition:background .18s,border-color .18s,color .18s,transform .18s;
}

button:hover:not(:disabled){
  background:#171717;
  border-color:var(--green);
  color:#f0fff0;
}

button:active:not(:disabled){
  transform:translateY(1px);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.miniBtn{
  padding:7px 10px;
  font-size:12px;
}

.green{color:var(--green);}
.red{color:var(--red);}
.purple{color:var(--purple);}
.yellow{color:var(--yellow);}
.muted{color:var(--muted);}

.inputLine{
  width:min(420px,100%);
  padding:11px 12px;
  background:#050505;
  color:#fff;
  border:1px solid var(--line-strong);
  outline:none;
}

.inputLine:focus{
  border-color:var(--green);
}

.modal{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:min(86%,720px);
  background:#101010;
  border:1px solid var(--line-strong);
  display:none;
  flex-direction:column;
  z-index:10;
  box-shadow:0 18px 60px rgba(0,0,0,.65);
}

#phone{top:10%;height:74%;}
#bag{top:16%;height:62%;}

.modalHeader{
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  color:var(--green);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.modalBody{
  padding:12px;
  overflow-y:auto;
  flex:1;
}

.phoneGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
}

.phoneBtn{
  width:100%;
  min-height:52px;
}

.section{
  border-top:1px solid var(--line);
  padding-top:12px;
  margin-top:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  border-bottom:1px solid #1d1d1d;
  padding:9px 0;
}

.row:last-child{border-bottom:0;}

.danger{
  border-color:#5b2a2a;
  color:#ffd3d3;
}

#terminalGrid{
  display:grid;
  grid-template-columns:minmax(230px,280px) minmax(0,1fr) minmax(230px,280px);
  gap:12px;
  min-height:0;
  padding:12px;
}

.sidePanel,#centerPanel{
  min-height:0;
}

.sidePanel{
  display:flex;
  flex-direction:column;
  gap:12px;
}

#centerPanel{
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr) auto auto;
  gap:10px;
}

.panelBlock{
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.18));
  padding:12px;
  min-height:0;
  box-shadow:0 0 24px rgba(144,255,144,.025);
}

.panelBlock.grow{
  flex:1;
  overflow:auto;
}

.panelTitle{
  color:#e5e5e5;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  border-bottom:1px solid #1e1e1e;
  padding-bottom:8px;
  margin-bottom:10px;
}

#sceneHeader{
  border:1px solid var(--line);
  background:#0a0a0a;
  padding:11px 12px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}

#locationName{
  color:#f4f4f4;
  font-size:18px;
}

#locationDesc{
  display:block;
  color:var(--muted);
  margin-top:4px;
  line-height:1.4;
}

#threatBadge{
  border:1px solid var(--line-strong);
  padding:6px 9px;
  color:var(--green);
  min-width:72px;
  text-align:center;
}

#worldTicker,#channelDock{
  border:1px solid var(--line);
  background:#090909;
}

#worldTicker{
  min-height:42px;
  padding:10px 12px;
  color:var(--muted);
  overflow:hidden;
}

#channelDock{
  padding:10px 12px;
  max-height:128px;
  overflow:auto;
}

#channels,.feedBox,#mapNodes,.compactList{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.feedItem,.channelMsg,.mapNode,.ghostItem{
  border:1px solid #202020;
  background:rgba(255,255,255,.018);
  padding:8px;
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}

.mapNode{
  cursor:pointer;
  color:#ddd;
}

.mapNode:hover{
  border-color:var(--green);
}

.mapNode.active{
  color:var(--green);
  border-color:var(--green);
  box-shadow:0 0 16px rgba(144,255,144,.08);
}

.mapNode.dangerous{
  color:#ffc9c9;
  border-color:#492424;
}

#actionMenu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

#actionMenu button{
  padding:9px 10px;
  min-height:38px;
}

.msg-system{color:#9ad7ff;}
.msg-world{color:#d8d8d8;}
.msg-danger{color:var(--red);}
.msg-npc{color:var(--yellow);}
.msg-log{color:var(--muted);}

body.pollution-critical{
  animation:screenJitter .22s infinite steps(2,end);
}

body.pollution-critical button:nth-child(3n)::after{
  content:" //ERR";
  color:#ff4d4d;
}

@keyframes screenJitter{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(1px,-1px);}
}

@media (max-width:640px){
  body{align-items:stretch;}
  #game{
    width:100%;
    height:100vh;
    border-left:0;
    border-right:0;
  }
  #title{
    align-items:flex-start;
    flex-direction:column;
    font-size:19px;
  }
  #quickActions{
    justify-content:flex-start;
  }
  #output{
    padding:14px;
  }
  .modal{
    width:94%;
  }
}

@media (max-width:980px){
  body{overflow:auto;}
  #game{height:auto;min-height:100vh;}
  #terminalGrid{
    grid-template-columns:1fr;
  }
  #centerPanel{
    min-height:70vh;
  }
}
</style>
</head>
<body>

<div id="game">
  <header id="title">
    <div>
      <span>《都市异闻录：鬼契约》</span>
      <small>YUSHEN FIELD TERMINAL / SCP-LIKE INCIDENT CLIENT</small>
    </div>
    <div id="quickActions">
      <button id="phoneQuickBtn" class="miniBtn" onclick="openPhone()">旧手机</button>
      <button id="bagQuickBtn" class="miniBtn" onclick="openBag()">背包</button>
      <button class="miniBtn" onclick="saveGame()">保存</button>
    </div>
  </header>

  <main id="terminalGrid">
    <aside id="leftPanel" class="sidePanel">
      <section class="panelBlock">
        <div class="panelTitle">玩家档案</div>
        <div id="status"></div>
      </section>
      <section class="panelBlock">
        <div class="panelTitle">契约状态</div>
        <div id="ghostPanel" class="compactList"></div>
      </section>
      <section class="panelBlock grow">
        <div class="panelTitle">节点地图</div>
        <div id="mapNodes"></div>
      </section>
    </aside>

    <section id="centerPanel">
      <div id="sceneHeader">
        <div>
          <span id="locationName">未定位</span>
          <small id="locationDesc">等待终端同步位置数据</small>
        </div>
        <div id="threatBadge">SAFE</div>
      </div>
      <div id="worldTicker"></div>
      <div id="output"></div>
      <div id="choices"></div>
      <div id="channelDock">
        <div class="panelTitle">频道监听</div>
        <div id="channels"></div>
      </div>
    </section>

    <aside id="rightPanel" class="sidePanel">
      <section class="panelBlock">
        <div class="panelTitle">功能菜单</div>
        <div id="actionMenu">
          <button onclick="openBag()">背包</button>
          <button onclick="openPhone()">手机/终端</button>
          <button onclick="tasks()">任务</button>
          <button onclick="teleportUI()">地图</button>
          <button onclick="shop()">黑市</button>
          <button onclick="codex()">图鉴</button>
          <button onclick="showRulesPanel()">规则</button>
          <button onclick="showAchievements()">成就</button>
        </div>
      </section>
      <section class="panelBlock">
        <div class="panelTitle">系统公告</div>
        <div id="systemFeed" class="feedBox"></div>
      </section>
      <section class="panelBlock grow">
        <div class="panelTitle">动态提示</div>
        <div id="hintFeed" class="feedBox"></div>
      </section>
    </aside>
  </main>

  <div id="phone" class="modal">
    <div class="modalHeader">
      <span id="phoneTitle">旧手机</span>
      <button class="miniBtn" onclick="closePhone()">关闭</button>
    </div>
    <div id="phoneBody" class="modalBody">
      <div class="phoneGrid">
        <button class="phoneBtn" onclick="tasks()">任务</button>
        <button class="phoneBtn" onclick="teleportUI()">传送</button>
        <button class="phoneBtn" onclick="shop()">黑市商店</button>
        <button class="phoneBtn" onclick="codex()">异常图鉴</button>
      </div>
    </div>
  </div>

  <div id="bag" class="modal">
    <div class="modalHeader">
      <span>背包</span>
      <button class="miniBtn" onclick="closeBag()">关闭</button>
    </div>
    <div id="bagBody" class="modalBody"></div>
  </div>
</div>

<script>
const output = document.getElementById("output");
const choices = document.getElementById("choices");
const statusBar = document.getElementById("status");
const phone = document.getElementById("phone");
const phoneBody = document.getElementById("phoneBody");
const phoneTitle = document.getElementById("phoneTitle");
const phoneQuickBtn = document.getElementById("phoneQuickBtn");
const bag = document.getElementById("bag");
const bagBody = document.getElementById("bagBody");
const ghostPanel = document.getElementById("ghostPanel");
const mapNodes = document.getElementById("mapNodes");
const locationNameEl = document.getElementById("locationName");
const locationDescEl = document.getElementById("locationDesc");
const threatBadge = document.getElementById("threatBadge");
const worldTicker = document.getElementById("worldTicker");
const channels = document.getElementById("channels");
const systemFeed = document.getElementById("systemFeed");
const hintFeed = document.getElementById("hintFeed");

const SAVE_KEY = "urban_contract_save_v1";

const ghostBook = {
  ghostEye:{
    id:"ghostEye",
    name:"鬼眼",
    power:22,
    instability:22,
    passive:"洞察恐惧：受到的理智降低减少 50%。",
    desc:"一颗藏在掌心纹路里的眼，能看见鬼物行动前的恶意。",
    skills:[
      {id:"mindShock",name:"精神震荡",cost:18,desc:"造成精神震荡伤害，眩晕 1 回合，并追加敌人精神 10% + 20 的伤害。"},
      {id:"weakPoint",name:"窥破弱点",cost:14,desc:"造成中等伤害，并使敌人下一次造成的理智伤害降低 20%。"},
      {id:"terrorGaze",name:"恐惧凝视",cost:20,desc:"造成伤害，使敌人脆弱 2 回合，受到伤害提高 15%。"}
    ]
  },
  seamWraith:{
    id:"seamWraith",
    name:"缝尸线",
    power:20,
    instability:28,
    passive:"省力牵引：技能鬼气消耗减少 15%。",
    desc:"像黑色头发一样细的线，另一端连着看不见的尸体。",
    skills:[
      {id:"blackSuture",name:"黑线缝合",cost:16,desc:"造成伤害，并让敌人流血 2 回合。"},
      {id:"limbBind",name:"肢体牵引",cost:18,desc:"造成少量伤害，并有 70% 概率眩晕敌人 1 回合。"},
      {id:"borrowedPulse",name:"借尸还息",cost:22,desc:"造成伤害，并恢复少量理智。"}
    ]
  },
  ashUmbrella:{
    id:"ashUmbrella",
    name:"灰烬伞",
    power:18,
    instability:18,
    passive:"遮阴：污染增长减少 20%，危险时间理智损失额外减少 15%。",
    desc:"一把落满灰的旧伞，撑开时能听见雨落在坟土上的声音。",
    skills:[
      {id:"ashWard",name:"灰幕护身",cost:15,desc:"获得护盾，抵挡下一次部分伤害。"},
      {id:"rainNeedles",name:"阴雨针",cost:17,desc:"造成稳定伤害，并降低敌人攻击 2 回合。"},
      {id:"burialWind",name:"送葬风",cost:24,desc:"造成较高伤害，若敌人生命低于 35% 则额外伤害。"}
    ]
  }
};

const scenes = {};
const rookieGhostIds = ["ghostEye","seamWraith","ashUmbrella"];
const ruleTextArchive = {};

const locations = {
  "出租屋":{
    name:"出租屋",
    desc:"临时安全屋。可以睡觉、看电视、打坐、处理终端任务。",
    links:["街道","闹鬼医院","黑市"],
    danger:false,
    explored:true,
    onEnter:() => player.flags.escapedApartment ? apartmentHub() : startIntro()
  },
  "走廊":{
    name:"公寓走廊",
    desc:"14栋异常走廊，声控灯会记录你的移动。",
    links:["出租屋","楼梯间"],
    danger:true,
    explored:false,
    onEnter:escapeRoom
  },
  "街道":{
    name:"雨夜街道",
    desc:"公寓外的缓冲地带，便利店灯牌像一只没有闭上的眼。",
    links:["出租屋","便利店","闹鬼医院"],
    danger:false,
    explored:false,
    onEnter:afterApartmentStreet
  },
  "便利店":{
    name:"便利店 / 御神接应点",
    desc:"御神接应者曾在这里向你交付终端。",
    links:["街道","出租屋","黑市"],
    danger:false,
    explored:false,
    onEnter:meetNpc
  },
  "闹鬼医院":{
    name:"闹鬼医院",
    desc:"新手打怪区。走廊消毒水味很重，像刚洗过一场事故。",
    links:["出租屋","街道","诡秘医院"],
    danger:true,
    explored:false,
    onEnter:enterHospitalNode
  },
  "诡秘医院":{
    name:"诡秘医院",
    desc:"二阶突破试炼地。这里的规则比墙皮更容易脱落。",
    links:["闹鬼医院"],
    danger:true,
    explored:false,
    onEnter:startHospitalTrial
  },
  "黑市":{
    name:"黑市",
    desc:"深网终端投影出的交易层，价格会记住你看它的次数。",
    links:["出租屋","街道"],
    danger:false,
    explored:false,
    onEnter:shop
  },
  "地铁":{
    name:"末班地铁",
    desc:"暂未开放的城市节点。列车仍在地下空跑。",
    links:["街道"],
    danger:true,
    explored:false
  }
};

const TerminalUI = {
  channelSeed:[
    ["WORLD","[公告] 城市污染指数维持在灰色预警。"],
    ["NPC","御神接线员：不要在 03:00 后相信任何自动门。"],
    ["匿名用户","有人看到14栋的灯又亮了。"],
    ["SYSTEM","失踪人口数据同步失败，错误码 404-ROOM。"]
  ],
  pushFeed(target,text,type="log"){
    if(!target) return;
    const item = document.createElement("div");
    item.className = `feedItem msg-${type}`;
    item.innerText = text;
    target.prepend(item);
    while(target.children.length > 8) target.removeChild(target.lastChild);
  },
  pushChannel(channel,text){
    if(!channels) return;
    const item = document.createElement("div");
    item.className = "channelMsg";
    item.innerText = `[${channel}] ${text}`;
    channels.prepend(item);
    while(channels.children.length > 7) channels.removeChild(channels.lastChild);
  },
  renderLocation(){
    const loc = locations[player.location] || {name:player.location,desc:"未登记节点。",danger:false,links:[]};
    if(locationNameEl) locationNameEl.innerText = loc.name;
    if(locationDescEl) locationDescEl.innerText = loc.desc;
    if(threatBadge){
      threatBadge.innerText = loc.danger ? "DANGER" : "STABLE";
      threatBadge.style.color = loc.danger ? "var(--red)" : "var(--green)";
    }
    if(worldTicker){
      worldTicker.innerText = loc.danger ? "世界信息流：附近存在异常实体活动，建议保持终端在线。" : "世界信息流：节点信号稳定，未检测到直接追踪。";
    }
  },
  renderGhostPanel(){
    if(!ghostPanel) return;
    ghostPanel.innerHTML = "";
    if(!player.ghosts.length){
      const empty = document.createElement("div");
      empty.className = "ghostItem";
      empty.innerText = "尚未契约鬼。";
      ghostPanel.appendChild(empty);
      return;
    }
    player.ghosts.forEach(ghost => {
      const item = document.createElement("div");
      item.className = "ghostItem";
      item.innerText = `${ghost.name}\n力:${ghost.power} 失控:${ghost.instability}\n${ghost.passive || "无被动"}`;
      ghostPanel.appendChild(item);
    });
  },
  renderMap(){
    if(!mapNodes) return;
    mapNodes.innerHTML = "";
    Object.keys(locations).forEach(key => {
      const loc = locations[key];
      const node = document.createElement("button");
      node.className = `mapNode ${loc.danger ? "dangerous" : ""} ${player.location === key ? "active" : ""}`;
      node.innerText = `${loc.name}\n${loc.explored ? "已探索" : "未探索"} ｜ ${loc.danger ? "危险" : "稳定"}`;
      node.onclick = () => moveToLocation(key);
      mapNodes.appendChild(node);
    });
  },
  renderAll(){
    this.renderLocation();
    this.renderGhostPanel();
    this.renderMap();
  },
  seed(){
    this.channelSeed.forEach(([channel,text]) => this.pushChannel(channel,text));
    this.pushFeed(systemFeed,"御神终端初始化完成。","system");
    this.pushFeed(hintFeed,"提示：右侧功能菜单与左侧节点地图均可驱动游戏。","log");
  }
};

const hospitalEnemies = [
  {id:"facelessPatient",name:"无面病患",maxHp:90,spirit:80,attack:13,coins:[4,8],qiGain:5,skill:"抓挠病历"},
  {id:"stitchedNurse",name:"缝口护士",maxHp:105,spirit:90,attack:15,coins:[5,10],qiGain:6,skill:"消毒针雨"},
  {id:"backwardDoctor",name:"倒行医生",maxHp:125,spirit:110,attack:17,coins:[7,12],qiGain:7,skill:"逆行手术"}
];

let combat = null;

let player = freshPlayer();

function freshPlayer(){
  return {
    name:"",
    sanity:100,
    pollution:0,
    spirit:0,
    ghostQi:0,
    maxGhostQi:0,
    ghostCoins:0,
    exorcistLevel:1,

function normalizePlayer(data){
  const defaults = freshPlayer();
  player = Object.assign(freshPlayer(), data || {});
  player.inventory = Array.isArray(player.inventory) ? player.inventory : ["旧手机"];
  player.ghosts = Array.isArray(player.ghosts) ? player.ghosts : [];
  player.ghosts = player.ghosts.map(ghost => {
    const id = ghost.id === "redShadow" ? "ghostEye" : ghost.id;
    const base = ghostBook[id];
    return base ? Object.assign({},ghost,base,{id:base.id}) : ghost;
  });
  player.relics = Array.isArray(player.relics) ? player.relics : [];
  player.flags = Object.assign(freshPlayer().flags, player.flags || {});
  player.tasks = Array.isArray(player.tasks) ? player.tasks : defaults.tasks;
  player.tasks = defaults.tasks.map(defaultTask => {
    const savedTask = player.tasks.find(task => task.id === defaultTask.id);
    return Object.assign({}, defaultTask, savedTask || {}, {
      reward: defaultTask.reward
    });
  });
  player.rulesKnown = Array.isArray(player.rulesKnown) ? player.rulesKnown : [];
  player.codex = Array.isArray(player.codex) ? player.codex : ["redShadow"];
  if(player.codex.includes("redShadow")){
    player.codex = ["ghostEye","seamWraith","ashUmbrella"];
  }
  if(typeof player.time !== "number") player.time = 164;
  if(typeof player.chapter !== "number") player.chapter = 1;
  if(typeof player.violations !== "number") player.violations = 0;
  if(typeof player.ghostCoins !== "number") player.ghostCoins = 0;
  if(typeof player.exorcistLevel !== "number") player.exorcistLevel = 1;
  if(typeof player.qiAbsorbed !== "number") player.qiAbsorbed = 0;
  if(typeof player.hospitalKills !== "number") player.hospitalKills = 0;
  if(typeof player.spirit !== "number") player.spirit = 0;
  if(typeof player.ghostQi !== "number") player.ghostQi = 0;
  if(typeof player.maxGhostQi !== "number") player.maxGhostQi = player.spirit;
  player.sanity = Math.min(player.sanity, maxSanity());
  player.ghostQi = Math.min(player.ghostQi, player.maxGhostQi);
}

function messageTypeFromClass(className=""){
  if(className === "red" || className === "danger") return "danger";
  if(className === "purple" || className === "yellow") return "npc";
  if(className === "green") return "system";
  if(className === "muted") return "log";
  return "world";
}

function print(text,className=""){
  const type = messageTypeFromClass(className);
  const line = document.createElement("div");
  line.classList.add(`msg-${type}`);
  if(className) line.classList.add(className);
  line.innerText = text;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
  if(type === "danger") TerminalUI.pushFeed(systemFeed,text,"danger");
  if(type === "system") TerminalUI.pushFeed(systemFeed,text,"system");
  if(type === "npc") TerminalUI.pushChannel("NPC",text);
}

function clearChoices(){
  choices.innerHTML = "";
}

function addChoice(text,callback,options={}){
  const btn = document.createElement("button");
  btn.innerText = text;
  btn.disabled = Boolean(options.disabled);
  btn.onclick = () => {
    if(player.gameOver) return;
    callback();
  };
  choices.appendChild(btn);
  return btn;
}

function dayMinute(minutes=player.time){
  return ((minutes % 1440) + 1440) % 1440;
}

function formatTime(minutes=player.time){
  const day = Math.floor(minutes / 1440) + 1;
  const current = dayMinute(minutes);
  const h = Math.floor(current / 60);
  const displayMinute = current % 60;
  const dayText = day > 1 ? `D${day} ` : "";
  return `${dayText}${String(h).padStart(2,"0")}:${String(displayMinute).padStart(2,"0")}`;
}

function isAfterThree(){
  return isDangerTime();
}

function isDangerTime(minutes=player.time){
  const current = dayMinute(minutes);
  return current >= 180 && current < 420;
}

function isSleepTime(minutes=player.time){
  const current = dayMinute(minutes);
  return current >= 1320 || current < 420 || (current >= 720 && current < 840);
}

function dangerMultiplier(){
  return isDangerTime() ? 3 : 1;
}

function advanceTime(minutes=1,reason=""){
  const wasDanger = isDangerTime();
  player.time += minutes;
  if(reason) print(`[ TIME ] ${reason}，现在是 ${formatTime()}。`,"muted");
  const nowDanger = isDangerTime();
  if(!wasDanger && nowDanger){
    print("凌晨 3:00 到了。世界背面的东西开始靠近。","red");
    print("03:00-07:00 是最危险的时间，任何理智损失都会被放大。","red");
  }else if(wasDanger && !nowDanger){
    print("早晨 7:00 已过。危险窗口暂时关闭。","green");
  }
  passivePollution(minutes);
  updateStatus();
}

function learnRule(id,text){
  if(player.rulesKnown.includes(id)) return;
  player.rulesKnown.push(id);
  ruleTextArchive[id] = text;
  print(`[ RULE ] ${text}`,"yellow");
}

function ruleViolation(text,{sanity=10,pollution=5,lethal=false}={}){
  player.violations += 1;
  print(`[ 违规 ] ${text}`,"red");
  if(lethal){
    death("这是一条死亡规则。你听见身后有东西笑了一声，随后一切归于黑暗。");
    return;
  }
  changeStats({sanity:-sanity,pollution});
}

function maxSanity(){
  const base = 100 + player.spirit * 2;
  return player.pollution >= 100 ? Math.floor(base * 0.5) : base;
}

function isPollutionCritical(){
  return player.pollution >= 100;
}

function passivePollution(minutes){
  if(player.ghosts.length === 0) return;
  const pressure = player.ghostQi <= 0 ? 1 : 0.2;
  player.pollution = Math.min(150, player.pollution + minutes * pressure);
  if(player.ghostQi <= 0 && minutes > 0){
    print("鬼气枯竭，契约鬼的阴影开始反噬你的身体。污染正在上升。","red");
  }
}

function maybeGlitch(){
  if(!isPollutionCritical() || Math.random() > 0.18) return;
  const glitches = ["■■■■听见了吗■■", "不要相信状态栏", "红色是正常的", "祂在读你的存档", "0xGHOST_ERR_144"];
  print(glitches[Math.floor(Math.random() * glitches.length)],"red");
}

function updateStatus(){
  updateSystemAccess();
  document.body.classList.toggle("pollution-critical",isPollutionCritical());
  player.sanity = Math.min(player.sanity, maxSanity());
  statusBar.innerText =
    `玩家:${player.name || "未登录"}\n` +
    `时间:${formatTime()} ｜ 理智:${Math.floor(player.sanity)}/${maxSanity()} ｜ 精神:${player.spirit} ｜ 鬼气:${Math.floor(player.ghostQi)}/${player.maxGhostQi}\n` +
    `污染:${Math.floor(player.pollution)} ｜ 位置:${player.location} ｜ 经验值:${player.qiAbsorbed}/${realmQiCap()}\n` +
    `御鬼师:${player.exorcistLevel}级 ｜ 鬼币:${player.ghostCoins} ｜ 危险倍率:x${dangerMultiplier()}`;

  if(player.sanity <= 0 && !player.gameOver){
    death("你的理智被最后一声低语压垮。");
  }
  TerminalUI.renderAll();
}

function updateSystemAccess(){
  phoneQuickBtn.innerText = player.flags.systemsUnlocked ? "终端" : "旧手机";
  phoneTitle.innerText = player.flags.systemsUnlocked ? "神秘终端" : "旧手机";
}

function changeStats({sanity=0,pollution=0}){
  if(sanity < 0 && player.ghosts.some(ghost => ghost.id === "ghostEye")){
    sanity *= 0.5;
  }
  if(sanity < 0 && isDangerTime() && player.ghosts.some(ghost => ghost.id === "ashUmbrella")){
    sanity *= 0.85;
  }
  if(pollution > 0 && player.ghosts.some(ghost => ghost.id === "ashUmbrella")){
    pollution *= 0.8;
  }
  const sanityDelta = sanity < 0 ? sanity * dangerMultiplier() : sanity;
  player.pollution = Math.max(0, Math.min(150, player.pollution + pollution));
  player.sanity = Math.max(0, Math.min(maxSanity(), player.sanity + sanityDelta));
  updateStatus();
  maybeGlitch();
}

function setLocation(location){
  player.location = location;
  if(locations[location]) locations[location].explored = true;
  updateStatus();
}

function enterLocation(location){
  moveToLocation(location);
}

function moveToLocation(location){
  const loc = locations[location];
  setLocation(location);
  TerminalUI.pushFeed(hintFeed,`节点移动：${loc ? loc.name : location}`,"system");
  if(loc && typeof loc.onEnter === "function"){
    loc.onEnter();
  }else{
    clearChoices();
    print(`${location} 暂未开放。终端只捕捉到断续噪声。`,"muted");
    addChoice("返回出租屋",() => moveToLocation("出租屋"));
  }
}

function completeTask(id){
  const task = player.tasks.find(item => item.id === id);
  if(task && !task.done){
    task.done = true;
    print(`[ TASK ] ${task.title} 已完成`,"green");
    grantTaskReward(task);
  }
}

function grantTaskReward(task){
  if(!task.reward) return;
  if(task.reward.item) addItem(task.reward.item);
  if(task.reward.coins) addGhostCoins(task.reward.coins);
}

function addGhostCoins(amount){
  player.ghostCoins += amount;
  print(`[ REWARD ] 获得鬼币 x${amount}`,"green");
  updateStatus();
}

function hasItem(name){
  return player.inventory.includes(name);
}

function addItem(name){
  if(!hasItem(name)){
    player.inventory.push(name);
    print(`[ ITEM ] 获得：${name}`,"green");
  }
}

function describeReward(task){
  if(!task.reward) return "奖励：无";
  const parts = [];
  if(task.reward.item) parts.push(task.reward.item);
  if(task.reward.coins) parts.push(`鬼币 x${task.reward.coins}`);
  return `奖励：${parts.join("，")}`;
}

function saveGame(){
  localStorage.setItem(SAVE_KEY, JSON.stringify(player));
  print("[ SYSTEM ] 游戏已保存","green");
}

function loadGame(){
  const save = localStorage.getItem(SAVE_KEY);
  if(!save){
    print("没有找到存档。","red");
    login();
    return;
  }

  try{
    normalizePlayer(JSON.parse(save));
    updateStatus();
    clearChoices();
    print("[ SYSTEM ] 已读取存档","green");
    print(`你回到了${player.location}。`);
    addChoice("继续游戏",() => player.flags.escapedApartment ? afterApartmentStreet() : startIntro());
    addChoice(player.flags.systemsUnlocked ? "打开终端" : "查看旧手机",openPhone);
  }catch(error){
    print("存档损坏，已为你开启新游戏。","red");
    normalizePlayer();
    login();
  }
}

function newGame(){
  normalizePlayer();
  output.innerHTML = "";
  login();
}

function death(reason){
  if(player.flags.systemsUnlocked){
    postChapterDeath(reason);
    return;
  }
  player.gameOver = true;
  clearChoices();
  closePhone();
  closeBag();
  print("");
  print(reason,"red");
  print("你彻底崩溃了。","red");
  print("但这座城市没有放过你。","purple");
  addChoice("重启",() => location.reload());
}

function postChapterDeath(reason){
  const coinLoss = Math.min(player.ghostCoins, randomInt(5,18));
  const qiLoss = Math.min(player.qiAbsorbed, randomInt(3,10));
  player.ghostCoins -= coinLoss;
  player.qiAbsorbed -= qiLoss;
  player.location = "出租屋";
  player.sanity = Math.max(20, Math.floor(maxSanity() * 0.45));
  player.ghostQi = Math.max(0, Math.floor(player.maxGhostQi * 0.35));
  player.pollution = Math.min(150, player.pollution + 12);
  combat = null;
  clearChoices();
  closePhone();
  closeBag();
  print("");
  print(reason,"red");
  print(`[ 死亡惩罚 ] 你在出租屋惊醒，损失鬼币 ${coinLoss}，损失经验值 ${qiLoss}。`,"red");
  updateStatus();
  addChoice("起身",apartmentHub);
  addChoice("保存",saveGame);
  saveGame();
}

function renderBag(){
  bagBody.innerHTML = "";

  const itemSection = document.createElement("div");
  itemSection.innerHTML = `<b>物品</b><div class="muted" style="margin-top:6px">鬼币：${player.ghostCoins} ｜ 御鬼师等级：${player.exorcistLevel}级 ｜ 可驾驭鬼位：${ghostCapacity()}</div>`;

    const row = document.createElement("div");

    row.innerText = item;
    itemSection.appendChild(row);
  });

  if(player.relics.length){
    const relicTitle = document.createElement("div");

    relicTitle.innerHTML = "<b>鬼器</b>";
    player.relics.forEach(relic => {
      const row = document.createElement("div");
      row.className = "row";
      row.innerText = `${relic.name} ｜ 耐久:${relic.durability}/${relic.maxDurability}`;
      relicTitle.appendChild(row);
    });
    itemSection.appendChild(relicTitle);
  }

  const ghostSection = document.createElement("div");
  ghostSection.className = "section";
  ghostSection.innerHTML = "<b>契约鬼</b>";

  if(!player.flags.systemsUnlocked){

    locked.className = "muted";
    locked.style.marginTop = "10px";

    ghostSection.appendChild(locked);
    bagBody.appendChild(itemSection);
    bagBody.appendChild(ghostSection);
    return;
  }

  if(player.ghosts.length === 0){
    const empty = document.createElement("div");
    empty.className = "muted";
    empty.style.marginTop = "10px";
    empty.innerText = "暂无契约鬼。";
    ghostSection.appendChild(empty);
  }

    const btn = document.createElement("button");
    btn.className = "miniBtn danger";
    btn.innerText = "使用";
    btn.onclick = () => useGhost(index);

    row.appendChild(btn);
    ghostSection.appendChild(row);

function contractGhost(id){
  if(!player.flags.systemsUnlocked){
    print("你还没有获得契约系统。","red");
    return;
  }
  if(!id){
    attractContractGhost();
    return;
  }
  const base = ghostBook[id];
  if(!base) return;
  if(player.ghosts.some(ghost => ghost.id === id)){
    print(`${base.name} 已经与你签订契约。`,"yellow");
    return;
  }
  if(player.ghosts.length >= ghostCapacity()){
    print(`你的御鬼师等级不足。${player.exorcistLevel}级最多驾驭 ${ghostCapacity()} 只鬼。`,"red");
    return;
  }
  if(!hasItem("契约卷轴")){
    print("你需要契约卷轴来吸引并束缚鬼。","red");
    return;
  }

  const ghost = {
    id:base.id,
    name:base.name,
    power:base.power,
    instability:base.instability,
    passive:base.passive,
    skills:base.skills
  };
  removeItem("契约卷轴");
  player.ghosts.push(ghost);
  if(player.spirit === 0 && player.maxGhostQi === 0){
    player.spirit = 100;
    player.maxGhostQi = 200;
    player.ghostQi = 200;
    player.sanity = Math.min(maxSanity(), player.sanity + 100);
    print("契约回路被点燃。精神提升至一阶基准：100，鬼气上限提升至 200。","green");
  }
  completeTask("first_contract");
  print(`你契约了：${ghost.name}`,"purple");
  changeStats({pollution:8});
  saveGame();
  renderBag();
  clearChoices();
  addChoice("回到出租屋",apartmentHub);
  addChoice("查看契约鬼",openBag);
  addChoice("前往闹鬼医院",hospitalHub);
}

function attractContractGhost(){
  if(!player.flags.systemsUnlocked){
    print("你还没有获得契约系统。","red");
    return;
  }
  if(!hasItem("契约卷轴")){
    print("你没有契约卷轴。","red");
    return;
  }
  if(!isDangerTime()){
    print("契约卷轴只有在 03:00-07:00 之间能吸引鬼到来。","red");
    return;
  }
  if(player.ghosts.length >= ghostCapacity()){
    print("你的御鬼位已满。","red");
    return;
  }
  const available = rookieGhostIds.filter(id => !player.ghosts.some(ghost => ghost.id === id));
  if(!available.length){
    print("附近已经没有适合新手契约的鬼。","yellow");
    return;
  }
  const id = available[Math.floor(Math.random() * available.length)];
  const ghost = ghostBook[id];
  print("");
  print("你撕开契约卷轴，纸灰逆着风飘向天花板。","purple");
  print(`${ghost.name} 被吸引而来。${ghost.desc}`,"purple");
  clearChoices();
  addChoice(`契约 ${ghost.name}`,() => contractGhost(id));
  addChoice("放弃契约",() => {
    print("你收回卷轴，鬼影慢慢退进墙里。");
    apartmentHub();
  });
}

function ghostCapacity(){
  if(player.exorcistLevel >= 9) return 4;
  if(player.exorcistLevel >= 6) return 3;
  if(player.exorcistLevel >= 3) return 2;
  if(player.exorcistLevel >= 1) return 1;
  return 0;
}

function removeItem(name){
  const index = player.inventory.indexOf(name);
  if(index >= 0){
    player.inventory.splice(index,1);
    return true;
  }
  return false;
}

function useGhost(index){
  const ghost = player.ghosts[index];
  if(!ghost) return;
  if(player.ghostQi < 10){
    print("鬼气不足，你无法稳定驾驭契约鬼。污染开始反噬。","red");
    changeStats({pollution:10});
    return;
  }

  print(`你借用了 ${ghost.name} 的力量。`,"purple");
  player.ghostQi = Math.max(0, player.ghostQi - 10);
  changeStats({sanity:-ghost.instability,pollution:ghost.power});

  if(Math.random() < ghost.instability / 100){
    print("契约反噬。你的影子短暂地不属于你。","red");
    changeStats({sanity:-20,pollution:20});
  }

  saveGame();
  renderBag();
}

function levelUpExorcist(){
  if(player.qiAbsorbed < realmQiCap()){
    print("经验值还没有达到当前境界上限。","red");
    return;
  }
  if(player.exorcistLevel === 1 && !player.flags.hospitalTrialCleared){
    print("突破二阶需要先通过规则怪谈试炼：诡秘医院。","yellow");
    startHospitalTrial();
    return;
  }
  player.exorcistLevel += 1;
  player.spirit += 20;
  player.maxGhostQi += 20;
  player.ghostQi = player.maxGhostQi;
  player.sanity = maxSanity();
  player.qiAbsorbed = 0;
  print(`[ LEVEL ] 御鬼师等级提升至 ${player.exorcistLevel} 级。精神 +20，鬼气上限 +20。`,"green");
  updateStatus();
  saveGame();
}

function tasks(){
  if(!player.flags.systemsUnlocked){
    renderOldPhone();

  }

    enemy:Object.assign({},template,{hp:template.maxHp,statuses:{stun:0,weaken:0,vulnerable:0,bleed:0}}),
    playerStatuses:{stun:0,shield:0,qiTax:0,sanityCapDown:0},
    turn:1,
    log:[]
  };
  clearChoices();
  print("");
  print(`${template.name} 从病房深处走了出来。`,"red");

function renderCombat(){
  if(!combat) return;
  clearChoices();
  const enemy = combat.enemy;
  const ghost = player.ghosts[0];
  print("");
  print("========== 战斗 ==========","yellow");
  print(`回合 ${combat.turn} ｜ 地点：${player.location}`);
  print(`[敌] ${enemy.name}`);
  print(`HP ${bar(enemy.hp,enemy.maxHp)} ${Math.max(0,Math.floor(enemy.hp))}/${enemy.maxHp}`);
  print(`状态：${statusText(enemy.statuses)} ｜ 技能倾向：${enemy.skill}`);
  print("");
  print(`[你] ${player.name || "匿名者"} ｜ 契约鬼：${ghost.name}`);
  print(`理智 ${bar(player.sanity,maxSanity())} ${Math.floor(player.sanity)}/${maxSanity()}`);
  print(`鬼气 ${bar(player.ghostQi,player.maxGhostQi)} ${Math.floor(player.ghostQi)}/${player.maxGhostQi}`);
  print(`状态：护盾 ${combat.playerStatuses.shield} ｜ ${statusText(combat.playerStatuses)}`);
  print("==========================","yellow");

  if(combat.playerStatuses.stun > 0){
    addChoice("被眩晕，跳过回合",() => {
      combat.playerStatuses.stun -= 1;
      enemyTurn();
    });
    return;
  }

  ghost.skills.forEach(skill => {
    addChoice(`${skill.name} / ${skillCost(skill.cost)}鬼气`,() => useCombatSkill(skill.id));
  });
  addChoice("使用补给",openCombatItems,{disabled:!hasCombatItem()});
  addChoice("使用鬼器",useRelicSkill,{disabled:!getRelic("不详的手术刀") || getRelic("不详的手术刀").durability <= 0});
  addChoice("逃跑",fleeCombat);
}

function bar(value,max){
  const total = 10;
  const safeMax = Math.max(1,max);
  const fill = Math.max(0,Math.min(total,Math.round((value / safeMax) * total)));
  return `[${"#".repeat(fill)}${".".repeat(total - fill)}]`;
}

function statusText(statuses){
  const parts = Object.keys(statuses).filter(key => statuses[key] > 0).map(key => `${key}:${statuses[key]}`);
  return parts.length ? parts.join(" ") : "无";
}

function skillCost(base){
  let cost = base;
  if(player.ghosts[0] && player.ghosts[0].id === "seamWraith") cost *= 0.85;
  if(combat && combat.playerStatuses.qiTax > 0) cost *= 1.25;
  return Math.ceil(cost);
}

function useCombatSkill(skillId){
  if(!combat) return;
  const skill = player.ghosts[0].skills.find(item => item.id === skillId);
  if(!skill) return;
  const cost = skillCost(skill.cost);
  if(player.ghostQi < cost){
    print("鬼气不足，技能释放失败。污染反噬。","red");
    changeStats({pollution:8});
    enemyTurn();
    return;
  }
  player.ghostQi -= cost;
  resolveGhostSkill(skillId);
  if(checkEnemyDefeated()) return;
  enemyTurn();
}

function resolveGhostSkill(skillId){
  const enemy = combat.enemy;
  const vulnerable = enemy.statuses.vulnerable > 0 ? 1.15 : 1;
  let damage = 0;

  if(skillId === "mindShock"){
    damage = (22 + enemy.spirit * 0.1 + 20) * vulnerable;
    enemy.statuses.stun = Math.max(enemy.statuses.stun,1);
    print(`鬼眼睁开，精神震荡命中，造成 ${Math.floor(damage)} 伤害，并眩晕敌人。`,"purple");
  }else if(skillId === "weakPoint"){
    damage = 30 * vulnerable;
    enemy.statuses.weaken = Math.max(enemy.statuses.weaken,1);
    print(`你窥破弱点，造成 ${Math.floor(damage)} 伤害，敌人下次伤害降低。`,"purple");
  }else if(skillId === "terrorGaze"){
    damage = 24 * vulnerable;
    enemy.statuses.vulnerable = Math.max(enemy.statuses.vulnerable,2);
    print(`恐惧凝视压住敌人，造成 ${Math.floor(damage)} 伤害，并施加脆弱。`,"purple");
  }else if(skillId === "blackSuture"){
    damage = 28 * vulnerable;
    enemy.statuses.bleed = Math.max(enemy.statuses.bleed,2);
    print(`黑线缝进鬼物体内，造成 ${Math.floor(damage)} 伤害，并附加流血。`,"purple");
  }else if(skillId === "limbBind"){
    damage = 18 * vulnerable;
    if(Math.random() < 0.7) enemy.statuses.stun = Math.max(enemy.statuses.stun,1);
    print(`缝尸线牵住四肢，造成 ${Math.floor(damage)} 伤害。`,"purple");
  }else if(skillId === "borrowedPulse"){
    damage = 24 * vulnerable;
    changeStats({sanity:12});
    print(`你借来一截死者脉搏，造成 ${Math.floor(damage)} 伤害，并恢复理智。`,"purple");
  }else if(skillId === "ashWard"){
    damage = 8 * vulnerable;
    combat.playerStatuses.shield += 24;
    print("灰烬伞撑开灰幕，你获得 24 护盾。","purple");
  }else if(skillId === "rainNeedles"){
    damage = 26 * vulnerable;
    enemy.statuses.weaken = Math.max(enemy.statuses.weaken,2);
    print(`阴雨化针落下，造成 ${Math.floor(damage)} 伤害，并削弱敌人。`,"purple");
  }else if(skillId === "burialWind"){
    damage = (enemy.hp / enemy.maxHp < 0.35 ? 42 : 30) * vulnerable;
    print(`送葬风掠过病房，造成 ${Math.floor(damage)} 伤害。`,"purple");
  }
  enemy.hp -= damage;
  changeStats({pollution:1.5});
}

function enemyTurn(){
  if(!combat) return;
  const enemy = combat.enemy;
  applyEnemyBleed();
  if(checkEnemyDefeated()) return;
  if(enemy.statuses.stun > 0){
    print(`${enemy.name} 被眩晕，无法行动。`,"green");
    enemy.statuses.stun -= 1;
    endCombatRound();
    return;
  }
  let damage = enemy.attack + Math.floor(enemy.spirit * 0.04);
  if(enemy.statuses.weaken > 0) damage *= 0.8;
  if(combat.playerStatuses.shield > 0){
    const blocked = Math.min(combat.playerStatuses.shield,damage);
    combat.playerStatuses.shield -= blocked;
    damage -= blocked;
    print(`护盾抵挡 ${Math.floor(blocked)} 点伤害。`,"green");
  }
  if(damage > 0){
    print(`${enemy.name} 使用 ${enemy.skill}，你的理智降低 ${Math.floor(damage)}。`,"red");
    changeStats({sanity:-damage,pollution:2});
  }
  if(Math.random() < 0.18){
    combat.playerStatuses.qiTax = Math.max(combat.playerStatuses.qiTax,2);
    print("阴冷针孔扎进你的手臂：鬼气消耗增加 2 回合。","red");
  }
  if(player.gameOver) return;
  endCombatRound();
}

function endCombatRound(){
  if(!combat) return;
  tickStatuses(combat.enemy.statuses);
  tickStatuses(combat.playerStatuses);
  combat.turn += 1;
  renderCombat();
}

function tickStatuses(statuses){
  Object.keys(statuses).forEach(key => {
    if(statuses[key] > 0 && key !== "shield") statuses[key] -= 1;
  });
}

function applyEnemyBleed(){
  if(combat.enemy.statuses.bleed > 0){
    combat.enemy.hp -= 8;
    print(`${combat.enemy.name} 的伤口渗出黑血，受到 8 点流血伤害。`,"red");
  }
}

function checkEnemyDefeated(){
  if(!combat || combat.enemy.hp > 0) return false;
  const enemy = combat.enemy;
  print(`${enemy.name} 被你的契约鬼撕开，化成一缕冰冷鬼气。`,"green");
  finishHospitalKill(enemy);
  combat = null;
  clearChoices();
  addChoice("继续搜寻",startHospitalCombat);
  addChoice("返回出租屋",() => enterLocation("出租屋"));
  addChoice("保存",saveGame);
  return true;
}

function finishHospitalKill(enemy){
  player.hospitalKills += 1;
  const coins = randomInt(enemy.coins[0],enemy.coins[1]);
  addGhostCoins(coins);
  absorbQi(enemy.qiGain);
  maybeDropHospitalRelic();
  if(player.hospitalKills >= 10) completeTask("hospital_hunt");
  saveGame();
}

function absorbQi(amount){
  const cap = realmQiCap();
  const accepted = Math.min(amount,cap - player.qiAbsorbed);
  if(accepted <= 0){
    print("当前境界经验值已满，需要完成规则怪谈试炼后才能突破。","yellow");
    return;
  }
  player.qiAbsorbed += accepted;
  print(`[ 经验值 ] +${accepted}。`,"green");
  if(player.qiAbsorbed >= cap){
    print("当前境界经验值已满。下一步需要完成一次规则怪谈试炼才能突破。","yellow");
  }
}

function realmQiCap(){
  const caps = {1:120,2:260,3:460,4:720,5:1050,6:1450,7:1950,8:2600};
  return caps[player.exorcistLevel] || 3400;
}

function maybeDropHospitalRelic(){
  if(player.flags.hospitalRelicDropped) return;
  if(Math.random() >= 0.001) return;
  player.flags.hospitalRelicDropped = true;
  player.relics.push({id:"ominousScalpel",name:"不详的手术刀",durability:20,maxDurability:20});

}

function getRelic(name){

}

  relic.durability -= 1;

  enemyTurn();
}

function fleeCombat(){

function randomInt(min,max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function trialRuleBreak(text,{sanity=16,pollution=6,attackChance=0.45,lethal=false}={}){
  if(lethal){
    ruleViolation(text,{lethal:true});
    return;
  }
  print(`[ 规则偏移 ] ${text}`,"red");
  player.violations += 1;
  changeStats({sanity:-Math.floor(sanity * 0.55),pollution});
  if(Math.random() < attackChance){
    const damage = randomInt(14,28);
    print(`病房里的鬼物被你的错误吸引，发动袭击。理智额外降低 ${damage}。`,"red");
    changeStats({sanity:-damage,pollution:4});
  }else{
    print("墙上的白色涂层鼓起又落下，这次它没有完全醒来。","yellow");
  }
}

function startHospitalTrial(){
  if(player.exorcistLevel !== 1){
    print("当前只有二阶突破试炼开放。","yellow");
    return;
  }
  if(player.qiAbsorbed < realmQiCap()){
    print("经验值不足，无法开启突破试炼。","red");
    return;
  }
  if(player.flags.hospitalTrialCleared){
    print("你已经通过诡秘医院试炼。","green");
    return;
  }
  clearChoices();
  closePhone();
  closeBag();
  setLocation("诡秘医院");
  print("");
  print("你醒来时，已经在医院病床上。");
  print("灯是绿的，墙是白的，但白得不太对劲，像刷新失败的网页。");
  print("床头贴着一张纸：");
  print("《患者守则》请务必遵守，否则后果自负","yellow");
  print("旁边还有一句手写小字：如果你看到我，请装作没看到我。");
  print("署名的位置被涂黑。","red");
  print("");

function codex(){
  if(!player.flags.systemsUnlocked){
    renderOldPhone();
    return;
  }
  phoneBody.innerHTML = "<b>异常图鉴</b>";
  player.codex.forEach(id => {
    const ghost = ghostBook[id];
    if(!ghost) return;
    const box = document.createElement("div");
    box.className = "section";
    const skills = ghost.skills ? ghost.skills.map(skill => `- ${skill.name}：${skill.desc}`).join("\n") : "";
    box.innerText = `${ghost.name}\n力量:${ghost.power} 失控:${ghost.instability}\n被动：${ghost.passive || "无"}\n${ghost.desc}${skills ? "\n技能：\n" + skills : ""}`;
    phoneBody.appendChild(box);
  });
  addPhoneBack();
}

function addPhoneBack(){
  const back = document.createElement("button");
  back.className = "miniBtn";
  back.style.marginTop = "14px";
  back.innerText = "返回";
  back.onclick = renderPhoneHome;
  phoneBody.appendChild(back);
}

function showRulesPanel(){
  phone.style.display = "flex";
  phoneTitle.innerText = "规则档案";
  phoneBody.innerHTML = "<b>已记录规则</b>";
  if(!player.rulesKnown.length){
    const empty = document.createElement("div");
    empty.className = "muted";
    empty.style.marginTop = "10px";
    empty.innerText = "暂无规则记录。";
    phoneBody.appendChild(empty);
  }
  player.rulesKnown.forEach((rule,index) => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerText = `${String(index + 1).padStart(2,"0")} / ${ruleTextArchive[rule] || rule}`;
    phoneBody.appendChild(row);
  });
}

function showAchievements(){
  phone.style.display = "flex";
  phoneTitle.innerText = "成就";
  phoneBody.innerHTML = "<b>成就记录</b>";
  const data = [
    ["逃离公寓",player.flags.escapedApartment],
    ["御神接入",player.flags.systemsUnlocked],
    ["完成初契",player.ghosts.length > 0],
    ["医院清扫",player.hospitalKills >= 10],
    ["二阶试炼",player.flags.hospitalTrialCleared]
  ];
  data.forEach(([name,done]) => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerText = `${done ? "[完成]" : "[未完成]"} ${name}`;
    phoneBody.appendChild(row);
  });
}

  print("“只有鬼可以对付鬼。御鬼师要做的，就是驾驭鬼，用鬼去和鬼战斗。”","purple");
  print("“御鬼师共有九个等级。1、3、6、9级时，分别会开启新的御鬼位。”");
  print("“你现在是1级，只能驾驭一只鬼。别贪心，贪心的人通常死得很完整。”","red");
  unlockSystems();
  print("===== 第一章结束：终端系统已解锁 =====","green");
  print("");
  addChoice("打开终端",openPhone);
  addChoice("背包",openBag);
  addChoice("保存",saveGame);
  saveGame();
}

function unlockSystems(){
  if(player.flags.systemsUnlocked) return;
  player.flags.systemsUnlocked = true;
  player.chapter = 2;
  addItem("神秘终端");
  if(!hasItem("契约卷轴")) addItem("契约卷轴");
  learnRule("contract_warning","新规则：契约可以救命，也会污染你。");
  print("[ 御神 ] 新手任务奖励已发放：契约卷轴。","green");
  updateStatus();
}

function mainMenu(){
  output.innerHTML = "";
  clearChoices();
  updateStatus();
  if(!window.__terminalSeeded){
    TerminalUI.seed();
    window.__terminalSeeded = true;
  }
  print("《都市异闻录：鬼契约》","green");
  print("");
  print("第一章：逃离公寓。");
  print("规则会保护你，也会杀死你。03:00 以后危险翻倍。","muted");
  print("");
  addChoice("新游戏",newGame);
  addChoice("读取存档",loadGame);
}

function startAmbientNetwork(){
  const events = [
    ["WORLD","[失踪公告] 一名御鬼师最后定位于闹鬼医院地下层。"],
    ["匿名用户","你们有没有遇到过会改按钮文字的污染？"],
    ["NPC","御神接线员：污染超过阈值时，不要相信红色提示。"],
    ["SYSTEM","世界污染采样完成：数据存在轻微回声。"],
    ["匿名用户","404病房今天又上线了。"]
  ];
  setInterval(() => {
    const [channel,text] = events[Math.floor(Math.random() * events.length)];
    TerminalUI.pushChannel(channel,text);
    if(Math.random() < 0.35) TerminalUI.pushFeed(hintFeed,text,channel === "SYSTEM" ? "system" : "log");
  },18000);
}

function registerScene(name,handler){
  scenes[name] = handler;
}

function goScene(name){
  if(typeof scenes[name] === "function"){
    scenes[name]();
  }else{
    print(`场景不存在：${name}`,"red");
  }
}

registerScene("intro",startIntro);
registerScene("escapeRoom",escapeRoom);
registerScene("elevator",elevatorScene);
registerScene("stairs",stairsScene);
registerScene("street",afterApartmentStreet);
registerScene("npc",meetNpc);
registerScene("hospitalTrial",startHospitalTrial);

window.UrbanGame = {
  get player(){return player;},
  ghostBook,
  locations,
  TerminalUI,
  scenes,
  print,
  clearChoices,
  addChoice,
  updateStatus,
  changeStats,
  setLocation,
  moveToLocation,
  addItem,
  addGhostCoins,
  completeTask,
  levelUpExorcist,
  learnRule,
  ruleViolation,
  advanceTime,
  unlockSystems,
  ghostCapacity,
  apartmentHub,
  enterHospitalNode,
  hospitalHub,
  startHospitalTrial,
  sleepOneHour,
  watchTV,
  meditate,
  saveGame,
  loadGame,
  showRulesPanel,
  showAchievements,
  registerScene,
  goScene,
  contractGhost
};
